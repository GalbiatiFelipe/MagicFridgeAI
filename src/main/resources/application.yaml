spring:
  application:
    name: magicfridgeai

  datasource:
    url: $DB_URL=jdbc:postgresql://localhost:5432/magicfridgeai{}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true

openai:
  api:
    url: ${API_URL=https://api.openai.com/v1/responses}
    key: ${API_KEY}